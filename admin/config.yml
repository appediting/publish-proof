# Use DecapBridge classic auth (required)
backend:
  name: git-gateway
  repo: appediting/publish-proof
  branch: main
  identity_url: https://auth.decapbridge.com/sites/7642717e-b840-4ae4-92ba-2e40f3fa8788
  gateway_url: https://gateway.decapbridge.com
  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge
# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg
# Add site links in Decap CMS (optional)
site_url: https://publish-proof.pages.dev

# Decap requires a media folder even if no images are uploaded
media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "site"
    label: "Site content"
    files:
      - name: "events"
        label: "Events list"
        file: "data/events.json"
        format: "json"
        description: "Add, edit, or remove events, then click Publish to push them live."
        fields:
          - name: "events"
            label: "Events"
            label_singular: "Event"
            widget: "list"
            summary: "{{fields.title}} - {{fields.date}}"
            fields:
              - {name: "title", label: "Title", widget: "string"}
              - {name: "date", label: "Date", widget: "string", hint: "e.g. July 3, 2026"}
              - {name: "time", label: "Time", widget: "string", required: false, hint: "e.g. 6:00 to 9:00pm"}
              - {name: "location", label: "Location", widget: "string", required: false}
              - {name: "description", label: "Description", widget: "text", required: false}
